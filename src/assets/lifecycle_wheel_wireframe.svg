<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="900" height="520" fill="#ffffff"/>
  <text x="24" y="38" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111">
    Grenomy • Execution Wheel Wireframe (UI blueprint)
  </text>
  <text x="24" y="62" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">
    Left: circular lifecycle wheel • Right: phase details + actions • Top: role/version context
  </text>

  <!-- top header -->
  <rect x="24" y="80" width="852" height="62" rx="14" fill="#fafafa" stroke="#e5e5e5"/>
  <text x="44" y="112" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#111">
    Header: "Execution Wheel" + Persona Role + Version + Reset button
  </text>

  <!-- wheel container -->
  <rect x="24" y="160" width="520" height="336" rx="18" fill="#ffffff" stroke="#e5e5e5"/>
  <circle cx="284" cy="328" r="140" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <circle cx="284" cy="328" r="82" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <text x="284" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#111">
    Center: Active Phase + Status
  </text>

  <!-- phase labels around -->
  <text x="284" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#111">Inventory</text>
  <text x="382" y="228" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#111">Scope</text>
  <text x="428" y="318" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#111">Applic.</text>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#111">Plan</text>
  <text x="284" y="466" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#111">Collect</text>
  <text x="168" y="418" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#111">Validate</text>
  <text x="142" y="318" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#111">Compute</text>
  <text x="186" y="228" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#111">Approve</text>

  <!-- side panel -->
  <rect x="564" y="160" width="312" height="336" rx="18" fill="#ffffff" stroke="#e5e5e5"/>
  <text x="584" y="192" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#111">
    Side Panel
  </text>
  <text x="584" y="214" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">
    • Phase title + status badge
  </text>
  <text x="584" y="234" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">
    • Phase summary / checklist
  </text>
  <text x="584" y="254" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">
    • Block reasons (if any)
  </text>
  <text x="584" y="274" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">
    • Actions: Back / Next / Mark Done / Reopen
  </text>
  <text x="584" y="294" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">
    • Legend + tips
  </text>

  <!-- note -->
  <text x="24" y="510" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#777">
    This SVG is a wireframe artifact (design reference). Implementation lives in src/components/LifecycleWheel.tsx.
  </text>
